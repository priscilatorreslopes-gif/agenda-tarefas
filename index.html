<style>
:root {
  --plum: #5d1e6f;
  --plum-light: #7a3b8a;
  --rose: #d4447c;
  --rose-soft: #f0a0bf;
  --blush: #fdf2f6;
  --cream: #faf8f5;
  --surface: #ffffff;
  --text: #2d1b33;
  --text-muted: #8c7a92;
  --border: #ede4ef;
  --op-bg: #9f156b;
  --ass-bg: #53b5ad;
  --lid-bg: #5d1e6f;
  --shadow-sm: 0 1px 3px rgba(93,30,111,0.06);
  --shadow-md: 0 4px 16px rgba(93,30,111,0.08);
  --shadow-lg: 0 8px 32px rgba(93,30,111,0.12);
  --radius: 14px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
}

/* HEADER */
header {
  background: linear-gradient(135deg, var(--plum) 0%, #8b3a9f 40%, var(--rose) 100%);
  color: white;
  padding: 16px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  overflow: hidden;
}

header::before {
  content: '';
  position: absolute;
  top: -60%;
  right: -10%;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
  border-radius: 50%;
}

header::after {
  content: '';
  position: absolute;
  bottom: -80%;
  left: 20%;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(255,111,163,0.15) 0%, transparent 70%);
  border-radius: 50%;
}

.logoArea {
  display: flex;
  align-items: center;
  gap: 16px;
  position: relative;
  z-index: 1;
}

.logoArea img {
  height: 58px;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
}

.logoArea h2 {
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: 22px;
  letter-spacing: -0.3px;
}

.frase {
  position: relative;
  z-index: 1;
}

.frase img {
  height: 90px;
  opacity: 0.9;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));
}

/* TOPBAR */
.topbar {
  background: var(--surface);
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.topbarTop {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.controlsLeft, .controlsRight {
  display: flex;
  gap: 6px;
  align-items: center;
}

.controlsLeft button, .controlsRight button {
  background: var(--blush);
  color: var(--plum);
  border: 1px solid var(--border);
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s ease;
}

.controlsLeft button:hover, .controlsRight button:hover {
  background: var(--plum);
  color: white;
  border-color: var(--plum);
}

#month {
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: 18px;
  color: var(--plum);
  margin-left: 12px;
  text-transform: capitalize;
}

.controlsRight input[type="date"] {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  outline: none;
}

.controlsRight input[type="date"]:focus {
  border-color: var(--plum-light);
  box-shadow: 0 0 0 3px rgba(93,30,111,0.08);
}

.topbarBottom {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ACTION BUTTONS */
button {
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

.btnMain {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  color: var(--plum);
  padding: 9px 16px;
  border-radius: 100px;
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-sm);
  transition: all 0.2s ease;
  font-family: 'DM Sans', sans-serif;
}

.btnMain:hover {
  border-color: var(--rose);
  color: var(--rose);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.btnMain:active {
  transform: translateY(0);
  box-shadow: var(--shadow-sm);
}

/* CALENDAR GRID */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  padding: 16px 20px;
}

.day {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  min-height: 480px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  transition: box-shadow 0.2s ease;
}

.day:hover {
  box-shadow: var(--shadow-md);
}

.domingo {
  background: linear-gradient(180deg, #f6edff 0%, var(--surface) 40%);
  border-color: #e2d0f0;
}

.feriado {
  background: linear-gradient(180deg, #fff0f3 0%, var(--surface) 40%);
  border-color: #f5d0d8;
}

.aniversarioDia {
  background: linear-gradient(180deg, #fef7e0 0%, var(--surface) 40%);
  border-color: #f0e0b0;
}

.dayHeader {
  font-weight: 700;
  font-size: 14px;
  color: var(--plum);
  margin-bottom: 2px;
}

.feriadoNome {
  font-size: 10px;
  font-weight: 500;
  color: var(--rose);
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.counter {
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* TURNOS */

}

.turnoHeader {

  align-items: center;

.turnoHeader b {

.turnoHeader button:hover {

.tagPessoa:hover { opacity: 0.9; }

.tagPessoa span:last-child {

.tagPessoa:hover span:last-child { opacity: 1; }

.op { background: var(--op-bg); }
.ass { background: var(--ass-bg); }
.lid { background: var(--lid-bg); }

  background: linear-gradient(135deg, #fff4d6, #ffe8a0);

  margin-top: 4px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid #f0d890;
}

.delBirthday {
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 12px;
  opacity: 0.5;
  transition: opacity 0.15s;
}

.delBirthday:hover { opacity: 1; }

/* VACATION TAG */
.vacationTag {
  padding: 4px 8px;
  border-radius: 6px;
  color: white;
  font-size: 10px;
  font-weight: 600;
  margin-bottom: 3px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  letter-spacing: 0.2px;

.vacationTag span { cursor: pointer; }

/* TASKS */
.tasks { flex: 1; }

.task {

.taskButtons {

.taskButtons button {

  padding: 2px;
  border-radius: 4px;

.taskButtons button:hover { background: rgba(0,0,0,0.06); }

.done {
  text-decoration: line-through;
  opacity: 0.5;
}

.c1 { background: #fef9e0; }
.c2 { background: #e8f8e8; }
.c3 { background: #e4eeff; }
.c4 { background: #f2e8ff; }
.c5 { background: #ffe8f0; }
.c6 { background: #fff0e0; }

@keyframes slideUp {

.popupBox, .popupContent {

.popupBox label:hover {

  color: var(--text-muted);

.popupContent button {

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }

::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

// CONTRASTE WCAG 4.5:1

function getLuminance(hex){
let r=parseInt(hex.substr(1,2),16)/255
let g=parseInt(hex.substr(3,2),16)/255
let b=parseInt(hex.substr(5,2),16)/255
r=r<=0.03928?r/12.92:Math.pow((r+0.055)/1.055,2.4)
g=g<=0.03928?g/12.92:Math.pow((g+0.055)/1.055,2.4)
b=b<=0.03928?b/12.92:Math.pow((b+0.055)/1.055,2.4)
return 0.2126*r+0.7152*g+0.0722*b
}

function getContrastColor(bgHex){
let L=getLuminance(bgHex)
let contrastWhite=(1.05)/(L+0.05)
return contrastWhite>=4.5?"#ffffff":"#1a1a1a"
}

const coresFuncao={op:"#9f156b",ass:"#53b5ad",lid:"#5d1e6f"}

// MOTOR DE DATAS

function toDateLocal(dateString){
let [y,m,d] = dateString.split("-")
return new Date(Number(y), Number(m)-1, Number(d))
}

function toStringDate(date){
let y = date.getFullYear()
let m = String(date.getMonth()+1).padStart(2,'0')
let d = String(date.getDate()).padStart(2,'0')
return y+"-"+m+"-"+d
}

}

const nomes = ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"]
return nomes[date.getDay()]
}

{nome:"Luiza",funcao:"OP"},

let tasks = []

var vacationColors=["#f1c40f","#2ecc71","#3498db","#9b59b6","#e67e22"]

let currentDate = hoje()

/* FERIADOS */

function getFeriados(ano){

function pascoa(Y){
let a=Y%19,b=Math.floor(Y/100),c=Y%100,d=Math.floor(b/4),e=b%4
let f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3)
let h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4
let l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451)
let mes=Math.floor((h+l-7*m+114)/31)
let dia=((h+l-7*m+114)%31)+1
return new Date(Y,mes-1,dia)
}

function f(d){return toStringDate(d)}

let p=pascoa(ano)
let sexta=new Date(p);sexta.setDate(p.getDate()-2)
let corpus=new Date(p);corpus.setDate(p.getDate()+60)

var result = {}
result[ano+"-01-01"]="Confraternização"
result[ano+"-04-21"]="Tiradentes"
result[ano+"-05-01"]="Trabalho"
result[ano+"-09-07"]="Independência"
result[ano+"-10-12"]="Aparecida"
result[ano+"-11-02"]="Finados"
result[ano+"-11-15"]="República"
result[ano+"-12-25"]="Natal"
result[ano+"-08-01"]="Bauru"
result[f(sexta)]="Sexta Santa"
result[f(p)]="Páscoa"
result[f(corpus)]="Corpus Christi"
return result

}

let start=new Date(currentDate)

days.forEach(function(d,i){

let dateString = toStringDate(dayDate)

let feriados=getFeriados(dayDate.getFullYear())

let div=document.createElement("div")

let diaMes=String(dayDate.getDate()).padStart(2,'0')+"/"+String(dayDate.getMonth()+1).padStart(2,'0')

if(dayDate.getDay()===0) div.classList.add("domingo")

let dayTasks=tasks.filter(function(t){return t.day==dateString})

function addBirthday(){

function addTask(){

let d = document.getElementById("taskDate").value

if(!d || !t) return

db.collection("tasks").add({

  day: d,
  color: "c"+(Math.random()*6|0+1),
  done: false
})
.then(function(){ alert("Tarefa salva online 🚀") })

}

function saveTask(){

let text = document.getElementById("taskText").value
let start = document.getElementById("taskStart").value
let end = document.getElementById("taskEnd").value

if(!text || !start || !end) return

if(start === end){
  db.collection("tasks").add({
    text: text,
    day: start,
    color: "c"+(Math.random()*6|0+1),
    done: false
  })
}else{
  let current = new Date(start)
  let final2 = new Date(end)

  while(current <= final2){
    let dayStr = current.toISOString().split("T")[0]
    db.collection("tasks").add({
      text: text,
      day: dayStr,
      color: "c"+(Math.random()*6|0+1),
      done: false
    })
    current.setDate(current.getDate()+1)
  }
}

closeTaskPopup()

}

function toggleDone(id){
db.collection("tasks").doc(String(id)).get().then(function(doc){
  if(doc.exists){
    var current = doc.data().done
    db.collection("tasks").doc(String(id)).update({ done: !current })
  }
})
}

if(!confirm("Deseja excluir essa tarefa?")) return
db.collection("tasks").doc(String(id)).delete()
}

function addPessoa(dateString, turno){

let container = document.createElement("div")
container.className = "popupSelect"

let box = document.createElement("div")
box.className = "popupBox"

let title = document.createElement("h3")
title.textContent = "Selecione as colaboradoras"
box.appendChild(title)

let selecionadas = []

equipe.forEach(function(p){
  let label = document.createElement("label")

  let checkbox = document.createElement("input")
  checkbox.type = "checkbox"

  checkbox.onchange = function(){
    if(checkbox.checked){
      selecionadas.push(p.nome)
    }else{
      selecionadas = selecionadas.filter(function(n){return n !== p.nome})
    }
  }

  let span = document.createElement("span")
  span.textContent = p.nome

  label.appendChild(checkbox)
  label.appendChild(span)
  box.appendChild(label)
})

let btnSalvar = document.createElement("button")
btnSalvar.textContent = "Salvar"

btnSalvar.onclick = function(){
  if(selecionadas.length === 0){
    alert("Selecione pelo menos uma pessoa")
    return
  }

  let jaExistem = escala.filter(function(e){return e.date === dateString && e.turno === turno}).map(function(e){return e.nome})
  let novas = selecionadas.filter(function(nome){return !jaExistem.includes(nome)})
  let duplicadas = selecionadas.filter(function(nome){return jaExistem.includes(nome)})

  if(duplicadas.length > 0){
    alert("Já na escala: " + duplicadas.join(", "))
  }

  novas.forEach(function(nome){
    db.collection("escala").add({
      date: dateString,
      turno: turno,
      nome: nome
    })
  })

  document.body.removeChild(container)
}

let btnCancelar = document.createElement("button")
btnCancelar.textContent = "Cancelar"
btnCancelar.style.background = "var(--cream)"
btnCancelar.style.color = "var(--text-muted)"
btnCancelar.style.border = "1px solid var(--border)"
btnCancelar.onclick = function(){ document.body.removeChild(container) }

box.appendChild(btnSalvar)
box.appendChild(btnCancelar)

container.appendChild(box)
document.body.appendChild(container)

}

function renderEscala(dateString){

["abertura","intermediario","fechamento"].forEach(function(turno){

let container = document.getElementById(turno+"-"+dateString)
if(!container) return

container.textContent = ""

escala
  .filter(function(e){return e.date === dateString && e.turno === turno && e.nome})
  .forEach(function(e){

 let el = document.createElement("div")

let pessoa = equipe.find(function(p){
  return p.nome.trim().toLowerCase() === e.nome.trim().toLowerCase()
})

let funcaoClasse = "op"

if(pessoa){
  if(pessoa.funcao === "OP") funcaoClasse = "op"
  if(pessoa.funcao === "ASS") funcaoClasse = "ass"
  if(pessoa.funcao === "LID") funcaoClasse = "lid"
}

el.className = "tagPessoa " + funcaoClasse

let corFundo=coresFuncao[funcaoClasse]||"#9f156b"
let corTexto=getContrastColor(corFundo)
el.style.color=corTexto

let spanNome = document.createElement("span")
spanNome.textContent = "👤 " + e.nome

let btn = document.createElement("span")
btn.textContent = "✖"
btn.style.cursor = "pointer"
btn.onclick = function(){ deletePessoa(e.id) }

el.appendChild(spanNome)
el.appendChild(btn)

container.appendChild(el)

    })

  })

}

function editVacation(id){

let v = vacations.find(function(x){return String(x.id) === String(id)})
if(!v) return

let name = prompt("Nome", v.name)
let start = prompt("Início (DD/MM/AAAA)", formatBR(v.start))
let end = prompt("Fim (DD/MM/AAAA)", formatBR(v.end))

function convert(dateBR){
let p = dateBR.split("/")
return p[2]+"-"+p[1]+"-"+p[0]
}

v.name = name
v.start = convert(start)
v.end = convert(end)

localStorage.setItem("vacations", JSON.stringify(vacations))
render()

}

function deleteVacation(id){

vacations = vacations.filter(function(v){return String(v.id) !== String(id)})
localStorage.setItem("vacations", JSON.stringify(vacations))
render()

}

function formatBR(date){
let d = new Date(date)
let day = String(d.getDate()).padStart(2,'0')
let month = String(d.getMonth()+1).padStart(2,'0')
let year = d.getFullYear()
return day+"/"+month+"/"+year
}
