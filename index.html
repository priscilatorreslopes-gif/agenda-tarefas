// 🎨 CONTRASTE WCAG 4.5:1

function getLuminance(hex){
let r=parseInt(hex.substr(1,2),16)/255
let g=parseInt(hex.substr(3,2),16)/255
let b=parseInt(hex.substr(5,2),16)/255
r=r<=0.03928?r/12.92:Math.pow((r+0.055)/1.055,2.4)
g=g<=0.03928?g/12.92:Math.pow((g+0.055)/1.055,2.4)
b=b<=0.03928?b/12.92:Math.pow((b+0.055)/1.055,2.4)
return 0.2126*r+0.7152*g+0.0722*b
}

function getContrastColor(bgHex){
let L=getLuminance(bgHex)
let contrastWhite=(1.05)/(L+0.05)
return contrastWhite>=4.5?"#ffffff":"#1a1a1a"
}

/* FERIADOS */

function getFeriados(ano){

function pascoa(Y){
let a=Y%19,b=Math.floor(Y/100),c=Y%100,d=Math.floor(b/4),e=b%4
let f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3)
let h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4
let l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451)
let mes=Math.floor((h+l-7*m+114)/31)
let dia=((h+l-7*m+114)%31)+1
return new Date(Y,mes-1,dia)
}

function f(d){return toStringDate(d)}

let p=pascoa(ano)
let sexta=new Date(p);sexta.setDate(p.getDate()-2)
let corpus=new Date(p);corpus.setDate(p.getDate()+60)

return{
[ano+"-01-01"]:"Confraternização",
[ano+"-04-21"]:"Tiradentes",
[ano+"-05-01"]:"Trabalho",
[ano+"-09-07"]:"Independência",
[ano+"-10-12"]:"Aparecida",
[ano+"-11-02"]:"Finados",
[ano+"-11-15"]:"República",
[ano+"-12-25"]:"Natal",
[ano+"-08-01"]:"Bauru",
[f(sexta)]:"Sexta Santa",
[f(p)]:"Páscoa",
[f(corpus)]:"Corpus Christi"
}

}

  function saveTask(){

let text = document.getElementById("taskText").value
let start = document.getElementById("taskStart").value
let end = document.getElementById("taskEnd").value

if(!text || !start || !end) return

if(start === end){

  db.collection("tasks").add({
    text: text,
    day: start,
    color: "c"+(Math.random()*6|0+1),
    done: false
  })

}else{

  let current = new Date(start)
  let final = new Date(end)

  while(current <= final){

    let day = current.toISOString().split("T")[0]

    db.collection("tasks").add({
      text: text,
      day: day,
      color: "c"+(Math.random()*6|0+1),
      done: false
    })

    current.setDate(current.getDate()+1)
  }
}

closeTaskPopup()

}

  label.appendChild(span)

  box.appendChild(label)

})

let btnSalvar = document.createElement("button")
btnSalvar.innerText = "Salvar"

btnSalvar.onclick = () => {

  if(selecionadas.length === 0){
    alert("Selecione pelo menos uma pessoa")
    return
  }

  let jaExistem = escala.filter(e => e.date === dateString && e.turno === turno).map(e => e.nome)
  let novas = selecionadas.filter(nome => !jaExistem.includes(nome))
  let duplicadas = selecionadas.filter(nome => jaExistem.includes(nome))

  if(duplicadas.length > 0){
    alert("Já na escala: " + duplicadas.join(", "))
  }

  novas.forEach(nome => {
    db.collection("escala").add({
      date: dateString,
      turno: turno,
      nome: nome
    })
  })

  document.body.removeChild(container)
}

let btnCancelar = document.createElement("button")
btnCancelar.innerText = "Cancelar"
btnCancelar.style.background = "#ccc"
btnCancelar.style.color = "#333"
btnCancelar.onclick = () => document.body.removeChild(container)

box.appendChild(btnSalvar)
box.appendChild(btnCancelar)

container.appendChild(box)
document.body.appendChild(container)

}
  
  function renderEscala(dateString){

["abertura","intermediario","fechamento"].forEach(turno => {

let container = document.getElementById(`${turno}-${dateString}`)
if(!container) return

container.innerHTML = ""

escala
  .filter(e => e.date === dateString && e.turno === turno && e.nome)
  .forEach(e => {

 let el = document.createElement("div")

let pessoa = equipe.find(p =>
  p.nome.trim().toLowerCase() === e.nome.trim().toLowerCase()
)

let funcaoClasse = "op"

if(pessoa){
  if(pessoa.funcao === "OP") funcaoClasse = "op"
  if(pessoa.funcao === "ASS") funcaoClasse = "ass"
  if(pessoa.funcao === "LID") funcaoClasse = "lid"
}

el.className = "tagPessoa " + funcaoClasse

let corFundo=coresFuncao[funcaoClasse]||"#9f156b"
let corTexto=getContrastColor(corFundo)
el.style.color=corTexto

let spanNome = document.createElement("span")
spanNome.innerText = "👤 " + e.nome

let btn = document.createElement("span")
btn.innerText = "✖"
btn.style.cursor = "pointer"
btn.onclick = () => deletePessoa(e.id)

el.appendChild(spanNome)
el.appendChild(btn)

container.appendChild(el)

    })
    
  })

}

return p[2]+"-"+p[1]+"-"+p[0]
}

render()

}

render()

function formatBR(date){

let d = new Date(date)

let day = String(d.getDate()).padStart(2,'0')
let month = String(d.getMonth()+1).padStart(2,'0')
let year = d.getFullYear()

return day+"/"+month+"/"+year

}
